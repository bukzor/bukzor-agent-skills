$schema: "http://json-schema.org/draft-07/schema#"
description: Schema for goal entries in 020-goals.kb/
type: object
additionalProperties: false
required:
  - why
properties:
  why:
    description: Motivating items in the layer above (mission). Use slug 'mission' for the single mission .md.
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^[a-z0-9-]+$"
