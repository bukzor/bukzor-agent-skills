$schema: "http://json-schema.org/draft-07/schema#"
description: Schema for deferred-idea entries in 070-future-work.kb/
type: object
additionalProperties: false
required:
  - why
  - trigger
properties:
  why:
    $ref: "jsonschema/why.jsonschema.yaml"
  trigger:
    description: Explicit condition under which this idea becomes ready to pursue
    type: string
    minLength: 8
  status:
    $ref: "jsonschema/decision-lifecycle.jsonschema.yaml#/$defs/status"
  blocked-on:
    $ref: "jsonschema/decision-lifecycle.jsonschema.yaml#/$defs/blocked-on"
  superseded-by:
    $ref: "jsonschema/decision-lifecycle.jsonschema.yaml#/$defs/superseded-by"
allOf:
  - $ref: "jsonschema/decision-lifecycle.jsonschema.yaml#/$defs/superseded-requires-superseded-by"
