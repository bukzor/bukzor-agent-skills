$schema: "http://json-schema.org/draft-07/schema#"
title: SKILL.kb summary-file frontmatter
description: |
  Frontmatter for top-level summary files in SKILL.kb/ (e.g.
  self-audit.md) that summarize a sibling .kb/ collection.

type: object
required:
  - last-updated

properties:
  last-updated:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
    description: ISO date this file was last refreshed.

additionalProperties: false
