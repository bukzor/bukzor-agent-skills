# yaml-language-server: $schema=https://json-schema.org/draft-07/schema
$schema: "http://json-schema.org/draft-07/schema#"
description: Schema for food items in food.kb/
type: object
additionalProperties: false
required:
  - status
  - budget
properties:
  status:
    $ref: "jsonschema/status.jsonschema.yaml"
  budget:
    $ref: "jsonschema/budget.jsonschema.yaml"
  last-updated:
    description: Required for summary files (e.g., cake.md summarizing cake.kb/)
    type: date
