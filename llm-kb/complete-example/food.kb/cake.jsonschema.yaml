# yaml-language-server: $schema=https://json-schema.org/draft-07/schema
$schema: "http://json-schema.org/draft-07/schema#"
description: Schema for cake decisions in cake.kb/
type: object
additionalProperties: false
required:
  - status
properties:
  status:
    $ref: "../jsonschema/status.jsonschema.yaml"
  decision:
    description: The chosen option (present when status is decided)
    type: string
