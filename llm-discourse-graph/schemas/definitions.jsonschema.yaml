$schema: "http://json-schema.org/draft-07/schema#"
description: >
  What terms mean — scope, boundaries, usage. Establishes what a thing
  IS, independent of any claims about it. The body text is the
  definition itself: meaning, scope, examples, and boundaries.
type: object
additionalProperties: false
required:
  - term
properties:
  term:
    description: The term being defined (canonical form)
    type: string
  aliases:
    description: Alternative names or spellings for this term
    type: array
    items:
      type: string
  domain:
    description: Field or context in which this definition applies
    type: string
  broader:
    description: Path to a more general definition (SKOS-style hierarchy)
    type: string
  narrower:
    description: Paths to more specific definitions
    type: array
    items:
      type: string
  related:
    description: Paths to definitions of associated terms
    type: array
    items:
      type: string
  depends:
    description: Paths to nodes this definition depends on for context
    type: array
    items:
      type: string
  tags:
    description: Topic tags for cross-referencing
    type: array
    items:
      type: string
