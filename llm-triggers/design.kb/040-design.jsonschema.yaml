$schema: "http://json-schema.org/draft-07/schema#"
description: Schema for design entries in 040-design.kb/
type: object
additionalProperties: false
required:
  - why
properties:
  why:
    description: |
      Motivation edges: file-relative path references to the entries
      this one exists to serve — same-tower, or cross-tower into
      design-next.kb where the motivation genuinely lives there.
    type: array
    minItems: 1
    items:
      type: string
  status:
    description: |
      Decision lifecycle. Absent = `accepted` (the default working position).
      - `idea`: raw thought, possibly to be discarded
      - `proposal`: worked out enough to engage with; under consideration
      - `accepted`: decided; treat as ground truth
      - `rejected`: considered and not adopted (kept for visible alternatives)
      - `superseded`: was accepted, now replaced; see `superseded-by:`
    enum: [idea, proposal, accepted, rejected, superseded]
    default: accepted
  blocked-on:
    description: |
      What's needed to advance. Optional; meaningful for `idea` / `proposal`.
      - `discussion`: human deliberation
      - `information`: external facts (research, data, prior art)
    enum: [discussion, information]
  superseded-by:
    description: |
      File-relative path reference to the entry that replaces this one.
      Required when status is `superseded`.
    type: string
allOf:
  - if:
      properties:
        status:
          const: superseded
      required: [status]
    then:
      required: [superseded-by]
