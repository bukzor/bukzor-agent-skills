$schema: "http://json-schema.org/draft-07/schema#"
description: Schema for requirement entries in 030-requirements.kb/
type: object
additionalProperties: false
required:
  - why
properties:
  why:
    description: Motivating goal slugs from 020-goals.kb/
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^[a-z0-9-]+$"
