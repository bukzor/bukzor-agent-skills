$schema: "http://json-schema.org/draft-07/schema#"
description: Schema for design entries in 040-design.kb/
type: object
additionalProperties: false
required:
  - why
properties:
  why:
    description: Motivating requirement slugs from 030-requirements.kb/ (or same-layer slugs when appropriate)
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^[a-z0-9-]+$"
