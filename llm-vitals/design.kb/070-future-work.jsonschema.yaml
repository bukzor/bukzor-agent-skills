$schema: "http://json-schema.org/draft-07/schema#"
description: Schema for deferred-idea entries in 070-future-work.kb/
type: object
additionalProperties: false
required:
  - why
  - trigger
properties:
  why:
    description: Motivating slugs from any earlier layer
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^[a-z0-9-]+$"
  trigger:
    description: Explicit condition under which this idea becomes ready to pursue
    type: string
    minLength: 8
