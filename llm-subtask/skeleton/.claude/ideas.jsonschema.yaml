$schema: http://json-schema.org/draft-07/schema#
title: Todo/Idea Task Metadata
description: |
  Cost-benefit analysis frontmatter for todo.kb/ and ideas.kb/ task files.

  Helps answer: "Should I keep working on this?", "Is this worth doing?",
  and "Is the cost of NOT doing this growing?"

  All time values use SWE-hours (SWEh) as units, roughly equivalent to story points.
  One SWEh ≈ 60 minutes of focused software engineering work.

definitions:
  sweh-value:
    description: |
      Time investment measured in SWE-hours. Can be specified as:
      - Simple number: 1.5
      - Object with rationale: {@value: 1.5, rationale: "explanation"}

      The rationale form is recommended for non-obvious estimates, especially
      for timebox values where explaining "why stop here?" helps future readers
      understand the break-even point.

      An optional `confidence` annotation bands the trustworthiness of @value
      as an SWEH estimate. Absence implies `unsure` — the humble default for
      ratings that were not explicitly reasoned about.
    oneOf:
      - type: number
        minimum: 0
        description: "SWE-hours (shorthand when rationale is obvious)"
      - type: object
        description: "SWE-hours with explanatory rationale"
        properties:
          "@value":
            type: number
            minimum: 0
            description: "Time investment in SWE-hours"
          rationale:
            type: string
            description: "Why this estimate? What assumptions or constraints apply?"
          confidence:
            type: string
            enum: [hypothetical, tentative, unsure, confident, certain]
            default: unsure
            description: |
              Optional confidence band on @value as an SWEH estimate. Read as
              the probability the true SWEH is within a factor of 2 of @value
              (0.5×@value ≤ true ≤ 2×@value).

              Absence implies `unsure` — the humble default for ratings that
              were not explicitly reasoned about.

              Bands (rough probability of being within 2× of true):

              - hypothetical: ≤ 20%. Wouldn't be surprised if off by an
                order of magnitude. First-pass placeholders.
              - tentative: 20%–50%. More than a guess but coin-flip whether
                @value drives the right decision.
              - unsure: 50%–80%. Best guess from the rater's seat, not
                measurement-backed. Default for unexamined ratings.
              - confident: 80%–99%. Well-reasoned, defensible, would bet on it.
              - certain: ≥ 99%. Measured, verified, or trivially deducible.

              Low-confidence ratings (hypothetical, tentative) should be
              re-evaluated before driving prioritization decisions.
        required: ["@value"]
        additionalProperties: false

type: object
properties:
  managed-by:
    const: "Skill(llm-subtask)"
    description: |
      The skill whose conventions govern this file. Signals to cold-start
      agents which skill to load before operating on the file.

      The schema pins this to a single value because the schema itself is
      skill-local — a different skill's files use a different schema with
      its own const.

  cost-benefit-sweh:
    type: object
    description: |
      Cost-benefit analysis for task prioritization and timebox decisions.

      Answers two critical questions:
      1. When should I stop working on this? (timebox)
      2. How much time does completing this save/generate? (benefit-2w)
    properties:
      timebox:
        $ref: "#/definitions/sweh-value"
        description: |
          Break-even point: maximum time worth investing before diminishing returns.

          This is NOT an estimate of how long the task takes. It's the point where
          you should stop and reassess, even if incomplete. Answers: "At what point
          does continuing to work on this stop being worth it?"

          Rationale should explain: What constraints limit the value? What makes
          this the break-even threshold?

          Example: timebox 0.5 SWEh (30 min) because "confusion happened 3x this
          session; while context is fresh should take ~30 min to document clearly.
          Beyond that, diminishing returns on clarity vs time spent."

      benefit-2w:
        $ref: "#/definitions/sweh-value"
        description: |
          Expected time savings over next 2 weeks if task is completed successfully.

          Measures return on investment. Can be specified as simple number when
          obvious (e.g., "saves 1 hour" → 1) or with rationale for non-obvious
          benefits or assumptions.

          Consider:
          - Direct time savings (automation, preventing repeated work)
          - Reduced cognitive load (clearer docs, better tools)
          - Avoided future debugging/confusion
          - Multiplier effects (helps multiple people/sessions)

          Example: 1.5 SWEh because "prevents confusion for me and Claude agents,
          estimate 15 min saved per occurrence × 6 occurrences = 90 min"

      cost-of-delay-2w:
        $ref: "#/definitions/sweh-value"
        description: |
          Expected cost (in SWEh) incurred over the next 2 weeks if the task
          is NOT done. Optional; omit (or 0) when benefit-2w already captures
          the full asymmetry of action vs. inaction.

          Distinct from benefit-2w in that it measures downside / urgency, not
          upside. Use when the harm of inaction is what makes the item pressing:

          - Money / time bled while task remains undone (recurring fees,
            ongoing ACH pulls, daily friction with no fix in sight)
          - Decay of hot context on in-progress work (paused barrier work
            costs re-orientation on resume)
          - External deadlines (tax filings, ACH cycles, vesting windows)
            translated to opportunity cost over the 2-week horizon
          - Sunk-cost / momentum loss on multi-week efforts that stall

          Priority can be ranked WSJF-style:
            (benefit-2w + cost-of-delay-2w) / timebox

          Items lacking SWEH ratings entirely often do so because their
          urgency is dominated by cost-of-delay (e.g. financial migrations,
          strategic V0 work). Adding this field gives them a place in the
          prioritization frame.

          Example: 1.0 SWEh because "Ameriprise still pulls $458/mo ≈ ~1h
          SWEh-equivalent of opportunity cost over 2 weeks until ACH
          revocation lands."

    required: ["timebox", "benefit-2w"]
    additionalProperties: false

required: ["managed-by"]
additionalProperties: true
